<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insurance Product Knowledge Session</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
      height: 92vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1a56db, #0c3d8f);
      color: #fff;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon {
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header p  { font-size: 12px; opacity: 0.75; margin-top: 2px; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
    }
    .bubble.ai {
      background: #f1f3f4;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: #1a56db;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .typing {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 15px;
      background: #f1f3f4;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px;
      background: #999; border-radius: 50%;
      animation: bounce 1.1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    .input-area {
      padding: 14px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 110px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #1a56db; }

    button#sendBtn {
      width: 42px; height: 42px; flex-shrink: 0;
      background: #1a56db;
      border: none; border-radius: 50%;
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    button#sendBtn:hover    { background: #1344b0; }
    button#sendBtn:disabled { background: #c0c0c0; cursor: not-allowed; }

    .done-banner {
      background: #ecfdf5;
      color: #065f46;
      text-align: center;
      padding: 13px;
      font-size: 14px;
      font-weight: 500;
      border-top: 1px solid #a7f3d0;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">🛡️</div>
    <div>
      <h1>Insurance Product Assistant</h1>
      <p>AI-powered product knowledge session</p>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area" id="inputArea">
    <textarea id="input" rows="1" placeholder="Type your message…"></textarea>
    <button id="sendBtn" onclick="send()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let sessionId = null;
  let isDone = false;

  async function init() {
    const res = await fetch('/chat/start', { method: 'POST' });
    const data = await res.json();
    sessionId = data.session_id;
    addBubble(data.message, 'ai');
  }

  async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || isDone) return;

    input.value = '';
    input.style.height = 'auto';
    addBubble(text, 'user');
    document.getElementById('sendBtn').disabled = true;

    const typing = addTyping();

    try {
      const res = await fetch('/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await res.json();
      typing.remove();
      addBubble(data.message, 'ai');

      if (data.done) {
        isDone = true;
        document.getElementById('inputArea').replaceWith(
          Object.assign(document.createElement('div'), {
            className: 'done-banner',
            textContent: '✅ Session complete — confirmation emails have been sent.',
          })
        );
      }
    } catch {
      typing.remove();
      addBubble('Sorry, something went wrong. Please try again.', 'ai');
    }

    document.getElementById('sendBtn').disabled = false;
  }

  function addBubble(text, who) {
    const div = document.createElement('div');
    div.className = `bubble ${who}`;
    div.innerHTML = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    document.getElementById('messages').appendChild(div);
    scrollDown();
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    document.getElementById('messages').appendChild(div);
    scrollDown();
    return div;
  }

  function scrollDown() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  document.getElementById('input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });

  init();
</script>
</body>
</html>
